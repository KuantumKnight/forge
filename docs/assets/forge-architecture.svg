  <text x="1046" y="267" fill="#b3b0ab" font-family="Consolas,monospace" font-size="14">operator cockpit</text>
  <text x="1046" y="306" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="17">Fix next</text>
  <text x="1046" y="334" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="17">Evidence links</text>
  <text x="1046" y="362" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="17">Human override</text>
  <text x="1046" y="390" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="17">Audit trail</text>
