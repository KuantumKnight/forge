<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Forge triage cockpit</title>
  <desc id="desc">A stylized product mock showing Forge's queue, selected issue, investigation, evidence, and audit timeline.</desc>
  <rect width="1280" height="640" fill="#131313"/>
  <rect x="38" y="36" width="1204" height="568" fill="#1d1d1d" stroke="#f2f1ee" stroke-width="3"/>
  <rect x="38" y="36" width="1204" height="62" fill="#242424" stroke="#f2f1ee" stroke-width="3"/>
  <text x="68" y="76" fill="#f2f1ee" font-family="Arial Black,Arial,sans-serif" font-size="28" font-weight="900">FORGE</text>
  <rect x="178" y="56" width="154" height="24" fill="#131313" stroke="#4f4b46" stroke-width="2"/>
  <text x="190" y="73" fill="#827e78" font-family="Consolas,monospace" font-size="12" letter-spacing="2">TRIAGE COCKPIT</text>
  <rect x="840" y="52" width="130" height="32" fill="#131313" stroke="#ff4a1c" stroke-width="2"/>
  <text x="855" y="73" fill="#ff4a1c" font-family="Consolas,monospace" font-size="13" font-weight="700">3 critical</text>
  <rect x="984" y="52" width="108" height="32" fill="#131313" stroke="#00cdbe" stroke-width="2"/>
  <text x="1000" y="73" fill="#00cdbe" font-family="Consolas,monospace" font-size="13" font-weight="700">live pod</text>
  <rect x="1106" y="52" width="106" height="32" fill="#2d2d2d" stroke="#f2f1ee" stroke-width="2"/>
  <text x="1133" y="73" fill="#f2f1ee" font-family="Consolas,monospace" font-size="13" font-weight="700">Alex</text>

  <rect x="38" y="98" width="318" height="506" fill="#181818" stroke="#4f4b46" stroke-width="3"/>
  <text x="64" y="134" fill="#827e78" font-family="Consolas,monospace" font-size="13" font-weight="700" letter-spacing="2">PRIORITY QUEUE</text>
  <rect x="64" y="154" width="254" height="32" fill="#131313" stroke="#4f4b46" stroke-width="2"/>
  <text x="78" y="175" fill="#b3b0ab" font-family="Consolas,monospace" font-size="13">All sources / cli/cli</text>
  <g>
    <rect x="64" y="208" width="254" height="86" fill="#242424" stroke="#00cdbe" stroke-width="3"/>
    <rect x="64" y="208" width="8" height="86" fill="#ff4a1c"/>
    <text x="86" y="235" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="17" font-weight="800">Nil pointer crash</text>
    <text x="86" y="258" fill="#b3b0ab" font-family="Consolas,monospace" font-size="12">gh_142 - GitHub - 3 related</text>
    <rect x="86" y="268" width="74" height="18" fill="#ff4a1c"/>
    <text x="96" y="281" fill="#190a04" font-family="Consolas,monospace" font-size="11" font-weight="700">CRITICAL</text>
  </g>
  <g>
    <rect x="64" y="312" width="254" height="76" fill="#1d1d1d" stroke="#4f4b46" stroke-width="2"/>
    <rect x="64" y="312" width="8" height="76" fill="#ff9412"/>
    <text x="86" y="338" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="16" font-weight="800">SSO token failures</text>
    <text x="86" y="361" fill="#b3b0ab" font-family="Consolas,monospace" font-size="12">gh_158 - 2 related</text>
  </g>
  <g>
    <rect x="64" y="404" width="254" height="76" fill="#1d1d1d" stroke="#4f4b46" stroke-width="2"/>
    <rect x="64" y="404" width="8" height="76" fill="#ffc21c"/>
    <text x="86" y="430" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="16" font-weight="800">Rate-limit retry loop</text>
    <text x="86" y="453" fill="#b3b0ab" font-family="Consolas,monospace" font-size="12">slack - #support</text>
  </g>

  <rect x="356" y="98" width="506" height="506" fill="#1d1d1d" stroke="#4f4b46" stroke-width="3"/>
  <text x="386" y="134" fill="#827e78" font-family="Consolas,monospace" font-size="13" font-weight="700" letter-spacing="2">SELECTED ISSUE</text>
  <rect x="724" y="114" width="58" height="34" fill="#242424" stroke="#f2f1ee" stroke-width="2"/>
  <text x="745" y="137" fill="#f2f1ee" font-family="Consolas,monospace" font-size="18" font-weight="700">...</text>
  <text x="386" y="184" fill="#f2f1ee" font-family="Arial Black,Arial,sans-serif" font-size="28">Nil pointer crash on PR create</text>
  <rect x="386" y="208" width="104" height="26" fill="#ff4a1c"/>
  <text x="402" y="226" fill="#190a04" font-family="Consolas,monospace" font-size="12" font-weight="700">CRITICAL</text>
  <rect x="502" y="208" width="94" height="26" fill="#131313" stroke="#00cdbe" stroke-width="2"/>
  <text x="516" y="226" fill="#00cdbe" font-family="Consolas,monospace" font-size="12" font-weight="700">READY</text>
  <rect x="386" y="258" width="420" height="82" fill="#242424" stroke="#ff9412" stroke-width="3"/>
  <text x="406" y="284" fill="#ff9412" font-family="Consolas,monospace" font-size="12" font-weight="700">AI TRIAGE</text>
  <text x="406" y="312" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="17">Crash blocks PR creation when git remotes are missing.</text>
  <rect x="386" y="364" width="420" height="92" fill="#181818" stroke="#4f4b46" stroke-width="2"/>
  <text x="406" y="392" fill="#827e78" font-family="Consolas,monospace" font-size="12" font-weight="700">REPRODUCTION</text>
  <text x="406" y="420" fill="#b3b0ab" font-family="Consolas,monospace" font-size="13">1. Run gh pr create outside a git repo</text>
  <text x="406" y="442" fill="#b3b0ab" font-family="Consolas,monospace" font-size="13">2. Observe panic instead of actionable error</text>
  <rect x="386" y="480" width="420" height="78" fill="#181818" stroke="#4f4b46" stroke-width="2"/>
  <text x="406" y="508" fill="#827e78" font-family="Consolas,monospace" font-size="12" font-weight="700">RELATED REPORTS</text>
  <text x="406" y="536" fill="#00cdbe" font-family="Consolas,monospace" font-size="14">iss_003 - Slack reported same crash</text>

  <rect x="862" y="98" width="380" height="506" fill="#181818" stroke="#4f4b46" stroke-width="3"/>
  <text x="892" y="134" fill="#827e78" font-family="Consolas,monospace" font-size="13" font-weight="700" letter-spacing="2">INVESTIGATION &amp; EVIDENCE</text>
  <rect x="892" y="158" width="150" height="36" fill="#ff9412" stroke="#ff9412" stroke-width="2"/>
  <text x="914" y="181" fill="#241300" font-family="Consolas,monospace" font-size="13" font-weight="900">INVESTIGATE</text>
  <rect x="892" y="218" width="306" height="92" fill="#242424" stroke="#00cdbe" stroke-width="3"/>
  <text x="912" y="244" fill="#00cdbe" font-family="Consolas,monospace" font-size="12" font-weight="700">VERIFIED AGAINST REAL SOURCE</text>
  <text x="912" y="272" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="16">pkg/cmd/pr/create/create.go</text>
  <text x="912" y="294" fill="#b3b0ab" font-family="Consolas,monospace" font-size="13">L1023-L1034 - proposed patch</text>
  <rect x="892" y="334" width="306" height="98" fill="#131313" stroke="#4f4b46" stroke-width="2"/>
  <text x="912" y="360" fill="#37c46a" font-family="Consolas,monospace" font-size="13">+ if len(remotes) == 0 {</text>
  <text x="912" y="382" fill="#37c46a" font-family="Consolas,monospace" font-size="13">+   return nil, errors.New(...)</text>
  <text x="912" y="404" fill="#37c46a" font-family="Consolas,monospace" font-size="13">+ }</text>
  <line x1="902" y1="464" x2="902" y2="548" stroke="#35322f" stroke-width="2"/>
  <rect x="895" y="458" width="14" height="14" fill="#827e78"/>
  <text x="924" y="472" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="14">Issue ingested</text>
  <rect x="895" y="500" width="14" height="14" fill="#b07cff"/>
  <text x="924" y="514" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="14">AI triaged as Critical</text>
  <rect x="895" y="542" width="14" height="14" fill="#00cdbe"/>
  <text x="924" y="556" fill="#f2f1ee" font-family="Arial,sans-serif" font-size="14">Operator changed priority</text>
</svg>
